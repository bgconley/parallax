name: CI

on:
  push:
  pull_request:

jobs:
  phase0:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Validate contracts
        run: make validate

      - name: Render Compose
        run: docker compose -f docker-compose.yml --env-file .env.example config
