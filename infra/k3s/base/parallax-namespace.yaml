apiVersion: v1
kind: Namespace
metadata:
  name: parallax
  labels:
    app.kubernetes.io/name: parallax
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Secret
metadata:
  name: parallax-secrets
  namespace: parallax
type: Opaque
stringData:
  postgres-password: change-me
  minio-root-user: change-me
  minio-root-password: change-me
  auth-jwt-secret: change-me
  metrics-token: change-me
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: parallax-config
  namespace: parallax
data:
  PARALLAX_ENV: "production"
  PARALLAX_API_VERSION: "0.1.0"
  PARALLAX_CONTRACT_VERSION: "1.3.0"
  PARALLAX_AUTH_MODE: "external_bearer"
  PARALLAX_AUTH_JWT_ALGORITHM: "RS256"
  PARALLAX_AUTH_JWKS_URL: "https://auth.example.invalid/.well-known/jwks.json"
  PARALLAX_AUTH_JWT_ISSUER: "https://auth.example.invalid/"
  PARALLAX_AUTH_JWT_AUDIENCE: "parallax-api"
  PARALLAX_REDIS_URL: "redis://parallax-redis.parallax.svc.cluster.local:6379/0"
  PARALLAX_TEMPORAL_ADDRESS: "parallax-temporal.parallax.svc.cluster.local:7233"
  PARALLAX_OBJECT_STORAGE_ENDPOINT: "http://parallax-minio.parallax.svc.cluster.local:9000"
  PARALLAX_MODEL_BASE_URL: "http://parallax-model-internal.parallax.svc.cluster.local:8000"
