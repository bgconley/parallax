apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parallax-postgres-data
  namespace: parallax
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 40Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parallax-postgres-wal
  namespace: parallax
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: parallax-objects
  namespace: parallax
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
