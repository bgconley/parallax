openapi: 3.1.0
info:
  title: Parallax API
  version: 1.3.0
  description: Canonical v1.3 API contract for Parallax, a temporal-first personal
    intelligence application with timing analytics and user-controlled context awareness.
servers:
- url: https://api.parallax.local
  description: Local/staging base URL
security:
- bearerAuth: []
paths:
  /v1/health:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
  /v1/version:
    get:
      summary: Version metadata
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Version
          content:
            application/json:
              schema:
                type: object
  /v1/activities:
    post:
      summary: Create activity
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      summary: List activities
      operationId: listActivities
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/resolve:
    post:
      summary: Resolve activity name or alias
      description: Read-only resolver. This endpoint must not create aliases, emit
        events, enqueue jobs, or write audit rows beyond normal request logs. Alias
        creation uses /v1/activities/{activity_id}/aliases and requires a mutation
        envelope.
      operationId: resolveActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveActivityRequest'
      responses:
        '200':
          description: Resolution candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveActivityResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}:
    get:
      summary: Get activity
      operationId: getActivity
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
        '404':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}/aliases:
    post:
      summary: Add activity alias
      operationId: addActivityAlias
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                alias_text:
                  type: string
                user_confirmed:
                  type: boolean
                  default: true
              required:
              - mutation
              - alias_text
      responses:
        '201':
          description: Alias created
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}/relationships:
    post:
      summary: Create activity relationship
      operationId: createActivityRelationship
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                to_activity_id:
                  type: string
                  format: uuid
                kind:
                  type: string
                  enum:
                  - same_as
                  - alias_of
                  - part_of
                  - has_checkpoint
                  - variant_of
                  - related_to
                  - usually_before
                  - usually_after
                metadata:
                  type: object
              required:
              - mutation
              - to_activity_id
              - kind
      responses:
        '201':
          description: Relationship created
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}/profile:
    get:
      summary: Get activity profile
      operationId: getActivityProfile
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityProfile'
        '404':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions:
    post:
      summary: Create timing session
      operationId: createTimingSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimingSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingSession'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}:
    get:
      summary: Get timing session
      operationId: getTimingSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingSession'
        '404':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/events:
    post:
      summary: Append timing event
      operationId: appendTimingEvent
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendTimingEventRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingEvent'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/event-spans:
    post:
      summary: Create or correct timing span
      operationId: createTimingEventSpan
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                span:
                  $ref: '#/components/schemas/TimingEventSpan'
              required:
              - mutation
              - span
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingEventSpan'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/complete:
    post:
      summary: Complete timing session
      operationId: completeTimingSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTimingSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingSession'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/review:
    post:
      summary: Review timing session and decide model inclusion
      operationId: reviewTimingSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewTimingSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelUpdateDecision'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/discard:
    post:
      summary: Discard timing session
      operationId: discardTimingSession
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewTimingSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelUpdateDecision'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/annotations:
    post:
      summary: Create context annotation
      operationId: createContextAnnotation
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnotationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalContextAnnotation'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/annotations/{annotation_id}:
    get:
      summary: Get context annotation
      operationId: getContextAnnotation
      parameters:
      - name: annotation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalContextAnnotation'
        '404':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/annotations/{annotation_id}/extract:
    post:
      summary: Request annotation extraction
      operationId: extractContextAnnotation
      parameters:
      - name: annotation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                force:
                  type: boolean
                  default: false
              required:
              - mutation
      responses:
        '202':
          description: Extraction queued
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/extracted-events/{event_id}/confirm:
    post:
      summary: Confirm extracted event
      operationId: confirmExtractedEvent
      parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                confirmation_state:
                  type: string
                  enum:
                  - confirmed
                  - ignored
              required:
              - mutation
              - confirmation_state
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractedContextEvent'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/extracted-events/{event_id}/correct:
    post:
      summary: Correct extracted event
      operationId: correctExtractedEvent
      parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectExtractedEventRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractedContextEvent'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}/checkpoints:
    get:
      summary: List checkpoint templates
      operationId: listCheckpoints
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Checkpoint templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    put:
      summary: Replace checkpoint templates
      operationId: putCheckpoints
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutCheckpointsRequest'
      responses:
        '200':
          description: Checkpoint templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/activities/{activity_id}/preflight-checks:
    get:
      summary: List preflight checks
      operationId: listPreflightChecks
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PreflightCheck'
    post:
      summary: Create preflight check
      operationId: createPreflightCheck
      parameters:
      - name: activity_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePreflightCheckRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreflightCheck'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/temporal/predictions:
    post:
      summary: Create temporal prediction
      operationId: createTemporalPrediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePredictionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalPrediction'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/temporal/predictions/{prediction_id}/outcome:
    post:
      summary: Record prediction outcome
      operationId: recordPredictionOutcome
      parameters:
      - name: prediction_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                session_id:
                  type:
                  - string
                  - 'null'
                  format: uuid
                outcome_type:
                  type: string
                  enum:
                  - completed
                  - skipped
                  - deferred
                  - abandoned
                  - ignored
                actual_active_seconds:
                  type:
                  - integer
                  - 'null'
                  minimum: 0
                actual_wall_seconds:
                  type:
                  - integer
                  - 'null'
                  minimum: 0
              required:
              - mutation
              - outcome_type
      responses:
        '201':
          description: Outcome recorded
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/temporal/query:
    post:
      summary: Ask grounded question about time
      operationId: createTemporalQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemporalQueryRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalQueryAnswer'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/temporal/query/{answer_id}:
    get:
      summary: Get temporal query answer
      operationId: getTemporalQueryAnswer
      parameters:
      - name: answer_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporalQueryAnswer'
        '404':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/privacy/settings:
    get:
      summary: Get privacy settings
      operationId: getPrivacySettings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettings'
    put:
      summary: Update privacy settings
      operationId: updatePrivacySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mutation:
                  $ref: '#/components/schemas/MutationEnvelope'
                settings:
                  $ref: '#/components/schemas/PrivacySettings'
              required:
              - mutation
              - settings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettings'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/privacy/context-capture-policy:
    get:
      summary: Get context capture policy
      description: Canonical backend policy for whether location, radio, motion,
        and device context may be captured or retained for the authenticated user.
      operationId: getContextCapturePolicy
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextCapturePolicy'
    patch:
      summary: Update context capture policy
      description: Mutating policy update. Mobile clients must treat this response
        as the server-authoritative capture and retention policy before collecting
        optional context signals.
      operationId: updateContextCapturePolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContextCapturePolicyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextCapturePolicy'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/privacy/redact:
    post:
      summary: Redact raw/private content
      operationId: redactPrivacyData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyRedactRequest'
      responses:
        '202':
          description: Redaction queued
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/privacy/export:
    post:
      summary: Request data export
      operationId: requestPrivacyExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyExportRequest'
      responses:
        '202':
          description: Export queued
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/privacy/delete:
    post:
      summary: Request data deletion
      operationId: requestPrivacyDelete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyDeleteRequest'
      responses:
        '202':
          description: Deletion queued
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/sync/push:
    post:
      summary: Batch push offline mutations
      description: Mutating batch replay endpoint. The top-level mutation envelope
        identifies the sync push request; each operation payload still carries its
        own mutation envelope for endpoint-level idempotency when applicable.
      operationId: syncPush
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '202':
          description: Batch accepted
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/sync/pull:
    get:
      summary: Pull changes since cursor
      operationId: syncPull
      parameters:
      - name: cursor
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 100
          maximum: 500
      responses:
        '200':
          description: Changes
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/capture-context:
    post:
      summary: Create capture context snapshot for a timing session
      operationId: createCaptureContextSnapshot
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaptureContextSnapshotRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaptureContextSnapshot'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      summary: List capture context snapshots for a timing session
      operationId: listCaptureContextSnapshots
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaptureContextSnapshot'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/sessions/{session_id}/review-flags:
    get:
      summary: List timing review flags for a session
      description: Review flags are prompts and evidence for user review. They are
        not source timing facts and must not change session totals without an explicit
        user correction or review decision.
      operationId: listTimingReviewFlags
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/TimingReviewFlagStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimingReviewFlag'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/timing/review-flags/{flag_id}:
    patch:
      summary: Update a timing review flag
      operationId: updateTimingReviewFlag
      parameters:
      - name: flag_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTimingReviewFlagRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimingReviewFlag'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/places:
    post:
      summary: Create or confirm a user place
      operationId: createUserPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPlace'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      summary: List user places
      operationId: listUserPlaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserPlace'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/places/resolve:
    post:
      summary: Resolve inferred user place candidate
      description: Read-only resolver for place candidates. This endpoint returns
        a candidate or existing place match but must not create, confirm, or update
        a user place. New place confirmation uses POST /v1/places; edits use PATCH
        /v1/places/{place_id}.
      operationId: resolveUserPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolvePlaceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvePlaceResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/places/{place_id}:
    patch:
      summary: Update or confirm a user place
      operationId: updateUserPlace
      parameters:
      - name: place_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlaceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPlace'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /v1/analytics/feature-vectors/recompute:
    post:
      summary: Request temporal feature vector recomputation
      operationId: requestFeatureVectorRecompute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecomputeFeatureVectorsRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: &id001
                    type: string
                    format: uuid
                  status:
                    type: string
                required:
                - job_id
                - status
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
